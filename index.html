<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點名小CK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
:root{--bg:#060e06;--green:#39ff14;--gdim:#1a7a08;--dark:#071208;--scan:rgba(0,0,0,.13)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--green);font-family:'VT323',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,var(--scan) 0,var(--scan) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:100}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.65) 100%);pointer-events:none;z-index:99}

.wrap{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:10px}
.topbar{width:100%;display:flex;justify-content:space-between;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gdim);border-bottom:1px solid var(--gdim);padding-bottom:5px}
.robot-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.robot-svg{width:110px;height:110px;filter:drop-shadow(0 0 10px var(--green))}
.robot-name{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--green);text-shadow:0 0 10px var(--green);letter-spacing:2px}
.bubble{position:relative;background:var(--dark);border:3px solid var(--gdim);padding:10px 14px;width:calc(100% - 20px);max-width:360px;min-height:58px;box-shadow:inset 2px 2px 0 var(--gdim),0 0 14px rgba(57,255,20,.12)}
.bubble::before{content:'▶';position:absolute;top:-16px;left:50%;transform:translateX(-50%) rotate(-90deg);color:var(--gdim);font-size:12px}
.btext{font-size:22px;color:var(--green);line-height:1.35;min-height:40px}
.cursor{display:inline-block;width:10px;height:18px;background:var(--green);margin-left:2px;vertical-align:middle;animation:blink .7s step-end infinite}
@keyframes blink{50%{opacity:0}}


/* ── 花朵飄上特效 ── */

.float-text{position:fixed;bottom:-60px;pointer-events:none;z-index:501;
  font-family:'VT323',monospace;font-weight:700;text-align:center;
  animation:textFloat linear forwards;white-space:nowrap;
  text-shadow:0 0 8px currentColor;}
@keyframes textFloat{
  0%  {transform:translateY(0) scale(.7) rotate(0deg);opacity:0}
  12% {opacity:1;transform:translateY(-8px) scale(1.15) rotate(-3deg)}
  25% {transform:translateY(-20vh) scale(1) rotate(2deg)}
  75% {opacity:.95}
  100%{transform:translateY(-105vh) scale(.85) rotate(5deg);opacity:0}
}
.float-flower{position:fixed;bottom:-80px;pointer-events:none;z-index:500;animation:flowerFloat linear forwards}
@keyframes flowerFloat{
  0%  {transform:translateY(0) rotate(0deg) scale(.6);opacity:0}
  10% {opacity:1}
  80% {opacity:.9}
  100%{transform:translateY(-110vh) rotate(360deg) scale(1.1);opacity:0}
}
/* ── 啟動覆蓋層 ── */
.start-overlay{position:fixed;inset:0;background:#060e06;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:16px}
.start-icon{font-size:3rem;animation:pulse 1.2s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.5;transform:scale(.95)}to{opacity:1;transform:scale(1.05)}}
.start-title{font-family:'Press Start 2P',monospace;font-size:11px;color:#39ff14;text-shadow:0 0 12px #39ff14;letter-spacing:2px}
.start-sub{font-size:14px;color:#1a7a08;font-family:'VT323',monospace}
.mic-btn{background:transparent;border:3px solid var(--gdim);color:var(--green);font-family:'Press Start 2P',monospace;font-size:7px;padding:7px 14px;cursor:pointer;box-shadow:3px 3px 0 var(--dark);transition:all .1s;letter-spacing:1px}
.mic-btn:hover{background:var(--dark);box-shadow:1px 1px 0 var(--dark);transform:translate(2px,2px)}
.mic-btn.rec{border-color:var(--green);background:var(--dark);animation:mpulse .4s ease-in-out infinite alternate}
@keyframes mpulse{from{box-shadow:3px 3px 0 var(--dark)}to{box-shadow:3px 3px 0 var(--dark),0 0 18px rgba(57,255,20,.4)}}
.tags{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;min-height:26px}
.tag{padding:2px 8px;border:2px solid var(--gdim);font-size:14px;color:var(--gdim)}
.tag.new{border-color:var(--green);color:var(--green);text-shadow:0 0 5px var(--green)}
.statusbar{width:100%;border-top:1px solid var(--gdim);padding-top:5px;display:flex;justify-content:space-between;align-items:center;font-size:16px}
.dot{width:8px;height:8px;background:var(--gdim);display:inline-block;margin-right:5px}
.dot.on{background:var(--green);animation:pdot .5s ease-in-out infinite alternate}
.dot.err{background:#f33}
@keyframes pdot{from{opacity:.4}to{opacity:1}}
.diag-btn{background:transparent;border:1px solid #1a4a08;color:#1a7a08;font-family:'VT323',monospace;font-size:13px;padding:1px 6px;cursor:pointer}

/* ── 機器人表情動畫 ── */
@keyframes eyeScan{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}
@keyframes eyeThink{0%,100%{transform:translate(-2px,-1px)}50%{transform:translate(3px,1px)}}
@keyframes earFlash{0%,100%{fill:#39ff14}50%{fill:#071208}}
@keyframes earAlt{0%,100%{fill:#071208}50%{fill:#39ff14}}
@keyframes ledPulse{0%,100%{opacity:.15}50%{opacity:1}}
@keyframes happyBounce{0%,100%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-5px) rotate(-2deg)}70%{transform:translateY(-5px) rotate(2deg)}}
@keyframes robotShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}80%{transform:translateX(-3px)}}
@keyframes headNod{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-3deg)}}
/* 眼睛表情 */
.eye-grp{transform-origin:center;animation:eblink 3.5s ease-in-out infinite}
.eye-grp.listen{animation:elisten .5s ease-in-out infinite alternate}
.eye-grp.happy{animation:none}
@keyframes eblink{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(.08)}}
@keyframes elisten{from{transform:scaleY(1)}to{transform:scaleY(.65)}}
/* 故障動畫 */
@keyframes glitch{0%,94%,100%{transform:translateX(0);filter:none}95%{transform:translateX(-3px);filter:hue-rotate(90deg)}97%{transform:translateX(3px);filter:hue-rotate(-90deg)}}
.robot-svg{animation:glitch 9s infinite}
/* 手動輸入區 */
.manual-row{display:flex;gap:6px;width:calc(100% - 20px);max-width:360px;align-items:center}
.manual-input{flex:1;background:#071208;border:2px solid #1a7a08;color:#39ff14;padding:5px 10px;font-family:'VT323',monospace;font-size:24px;letter-spacing:2px;outline:none;transition:border-color .2s}
.manual-input:focus{border-color:#39ff14;box-shadow:0 0 8px rgba(57,255,20,.25)}
.manual-input::placeholder{color:#1a4a08;font-size:16px}
.manual-btn{background:#0d3d04;border:2px solid #39ff14;color:#39ff14;font-family:'Press Start 2P',monospace;font-size:7px;padding:7px 10px;cursor:pointer;white-space:nowrap;box-shadow:3px 3px 0 #050f03;transition:all .1s}
.manual-btn:hover{box-shadow:1px 1px 0 #050f03;transform:translate(2px,2px)}
.manual-toggle{background:transparent;border:1px solid #1a4a08;color:#1a7a08;font-family:'VT323',monospace;font-size:14px;padding:2px 8px;cursor:pointer;transition:all .2s}
.manual-toggle:hover{color:#39ff14;border-color:#39ff14}
</style>
</head>
<body>
<div class="start-overlay" id="startOverlay" onclick="onStartClick()">
  <div class="start-icon">🤖</div>
  <div class="start-title">▸ 點名小CK ◂</div>
  <div class="start-sub">[ 點擊任意處啟動系統 ]</div>
</div>
<iframe name="ck_write_frame" style="display:none"></iframe>
<div class="wrap">
  <div class="topbar">
    <span id="topTitle">GN432 // ROLL-CALL SYS v3.2</span>
    <span id="clock">--:--:--</span>
  </div>

  <div class="robot-area">
    <!-- 像素機器人 -->
    <svg class="robot-svg" viewBox="0 0 110 120" xmlns="http://www.w3.org/2000/svg">
      <rect x="18" y="14" width="74" height="72" fill="#050f03" stroke="#1a7a08" stroke-width="3"/>
      <rect x="24" y="20" width="62" height="60" fill="#071208" stroke="#0d3d04" stroke-width="1"/>
      <rect x="52" y="2" width="6" height="14" fill="#1a7a08"/>
      <rect x="46" y="0" width="18" height="4" fill="#1a7a08"/>
      <rect x="50" y="0" width="10" height="4" fill="#39ff14"/>
      <rect x="10" y="30" width="8" height="12" fill="#0d3d04" stroke="#1a7a08" stroke-width="2"/>
      <rect x="92" y="30" width="8" height="12" fill="#0d3d04" stroke="#1a7a08" stroke-width="2"/>
      <rect x="12" y="34" width="4" height="4" fill="#39ff14" id="earL"/>
      <rect x="94" y="34" width="4" height="4" fill="#39ff14" id="earR"/>
      <g class="eye-grp" id="eyeGrp">
        <rect x="28" y="28" width="22" height="18" fill="#071208" stroke="#1a7a08" stroke-width="2"/>
        <rect x="33" y="32" width="12" height="10" fill="#39ff14" id="eyeLP"/>
        <rect x="37" y="34" width="4" height="4" fill="#071208" id="dotL"/>
        <rect x="60" y="28" width="22" height="18" fill="#071208" stroke="#1a7a08" stroke-width="2"/>
        <rect x="65" y="32" width="12" height="10" fill="#39ff14" id="eyeRP"/>
        <rect x="69" y="34" width="4" height="4" fill="#071208" id="dotR"/>
      </g>
      <rect x="52" y="50" width="6" height="4" fill="#1a7a08"/>
      <g id="mouth">
        <rect x="36" y="62" width="4" height="3" fill="#1a7a08"/>
        <rect x="40" y="64" width="4" height="3" fill="#1a7a08"/>
        <rect x="44" y="65" width="22" height="4" fill="#39ff14"/>
        <rect x="66" y="64" width="4" height="3" fill="#1a7a08"/>
        <rect x="70" y="62" width="4" height="3" fill="#1a7a08"/>
      </g>
      <rect x="26" y="60" width="10" height="3" fill="#1a7a08" opacity=".6" id="blushL"/>
      <rect x="74" y="60" width="10" height="3" fill="#1a7a08" opacity=".6" id="blushR"/>
      <rect x="38" y="86" width="34" height="8" fill="#0d3d04" stroke="#1a7a08" stroke-width="2"/>
      <rect x="24" y="94" width="62" height="16" fill="#071208" stroke="#1a7a08" stroke-width="2"/>
      <rect x="44" y="98" width="8" height="8" fill="#39ff14" id="led1" opacity=".7"/>
      <rect x="58" y="98" width="8" height="8" fill="#1a7a08" id="led2"/>
    </svg>

    <div class="robot-name">▸ 點名小CK ◂</div>

    <div class="bubble">
      <div class="btext" id="btext">啟動中...<span class="cursor"></span></div>
    </div>

    <button class="mic-btn" id="micBtn" onclick="startListen()">[ 🎤 開始說話 ]</button>

    <!-- 手動輸入學號（備用） -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;width:100%">
      <button class="manual-toggle" id="manualToggleBtn" onclick="toggleManual()">⌨ 手動輸入學號</button>
      <div id="manualArea" style="display:none;width:calc(100% - 20px);max-width:360px;animation:fadeIn .2s">
        <div class="manual-row">
          <input class="manual-input" id="manualIdInput" type="tel" maxlength="10"
            placeholder="輸入學號，按 Enter"
            onkeydown="if(event.key==='Enter')submitManual()"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          <button class="manual-btn" onclick="submitManual()">確認</button>
        </div>
      </div>
    </div>

    <div class="tags" id="tags"></div>
  </div>

  <div class="statusbar">
    <span><span class="dot" id="dot"></span><span id="statusTxt">連線中</span></span>
    <span id="cntDisplay">已簽到 <b id="cntN">0</b><span id="cntTotal">/0</span> 人</span>
    <span>
      <button class="diag-btn" id="audioToggle" onclick="toggleAudio()" title="音效開關">🔊</button>
    <button class="diag-btn" onclick="exportCSV()" title="下載本地出席備份">💾</button>
      <button class="diag-btn" onclick="runDiag()">診斷</button>
    </span>
  </div>
</div>

<script>

// ════════════════════════════════════
// 設定
// ════════════════════════════════════
var GAS_URL         = 'https://ck-proxy.vercel.app/api/proxy';
// 花園/心情簽到直接用 GAS，不經過 Vercel
var GAS_DIRECT_URL  = 'https://script.google.com/macros/s/AKfycbwCVcFSTRhZSH3zse5WBFyR9HqZPjqhDpTTpephd3DrLZ1P_3LMYcOoSU0Q64Ya3WiD/exec';
var SESSION_ID = '';
var _lastStudentId = '';
var _lastCourseId  = 'GN432';
var GARDEN_URL = '';
var checkinCount = 0;
var SESSION_TOTAL = 0;  // 應到人數，confirmSession 時存入
var isListening  = false;
var isSpeaking   = false;
var recognition  = null;
var checkedSet   = {};   // 本地防重複記憶 { "場次ID_學號": true }
var localLog     = [];   // 本地出席備份陣列

// ════════════════════════════════════
// 時鐘
// ════════════════════════════════════
setInterval(function(){
  var n = new Date();
  document.getElementById('clock').textContent =
    ('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2)+':'+('0'+n.getSeconds()).slice(-2);
}, 1000);

// LED 閃爍
var ls = true;
setInterval(function(){
  ls = !ls;
  document.getElementById('led1').style.opacity = ls ? '.9' : '.3';
  document.getElementById('led2').style.opacity = ls ? '.3' : '.9';
}, 900);

// ════════════════════════════════════
// 打字效果
// ════════════════════════════════════
var _tt = null;
function typeText(txt){
  var el = document.getElementById('btext');
  if(_tt) clearInterval(_tt);
  el.innerHTML = '<span class="cursor"></span>';
  var i = 0;
  _tt = setInterval(function(){
    if(i < txt.length){
      el.textContent = txt.substring(0, i+1);
      i++;
    } else {
      clearInterval(_tt);
    }
  }, 38);
}

// ════════════════════════════════════
// 表情系統（完整版）
// ════════════════════════════════════
function _eyePupils(lx,ly,lw,lh,rx,ry,rw,rh){
  var lp=document.getElementById('eyeLP'),rp=document.getElementById('eyeRP');
  lp.setAttribute('x',lx);lp.setAttribute('y',ly);lp.setAttribute('width',lw);lp.setAttribute('height',lh);
  rp.setAttribute('x',rx);rp.setAttribute('y',ry);rp.setAttribute('width',rw);rp.setAttribute('height',rh);
  // 黑點（用 ID 精確選取，避免選到眼框）
  var dotL=document.getElementById('dotL'),dotR=document.getElementById('dotR');
  if(dotL){dotL.setAttribute('x',lx+4);dotL.setAttribute('y',ly+2);}
  if(dotR){dotR.setAttribute('x',rx+4);dotR.setAttribute('y',ry+2);}
}
function _setMouth(type){
  var r=document.getElementById('mouth').querySelectorAll('rect');
  // 全部恢復顯示
  for(var i=0;i<r.length;i++)r[i].style.display='';
  if(type==='smile'){
    // 原始笑臉
    r[0].setAttribute('x','36');r[0].setAttribute('y','62');r[0].setAttribute('fill','#1a7a08');
    r[1].setAttribute('x','40');r[1].setAttribute('y','64');r[1].setAttribute('fill','#1a7a08');
    r[2].setAttribute('x','44');r[2].setAttribute('y','65');r[2].setAttribute('width','22');r[2].setAttribute('height','4');r[2].setAttribute('fill','#39ff14');
    r[3].setAttribute('x','66');r[3].setAttribute('y','64');r[3].setAttribute('fill','#1a7a08');
    r[4].setAttribute('x','70');r[4].setAttribute('y','62');r[4].setAttribute('fill','#1a7a08');
  } else if(type==='big'){
    // 大笑
    r[0].setAttribute('x','33');r[0].setAttribute('y','59');r[0].setAttribute('fill','#39ff14');
    r[1].setAttribute('x','37');r[1].setAttribute('y','62');r[1].setAttribute('fill','#39ff14');
    r[2].setAttribute('x','41');r[2].setAttribute('y','64');r[2].setAttribute('width','28');r[2].setAttribute('height','4');r[2].setAttribute('fill','#39ff14');
    r[3].setAttribute('x','69');r[3].setAttribute('y','62');r[3].setAttribute('fill','#39ff14');
    r[4].setAttribute('x','74');r[4].setAttribute('y','59');r[4].setAttribute('fill','#39ff14');
  } else if(type==='frown'){
    // 苦臉
    r[0].setAttribute('x','36');r[0].setAttribute('y','68');r[0].setAttribute('fill','#1a7a08');
    r[1].setAttribute('x','40');r[1].setAttribute('y','66');r[1].setAttribute('fill','#1a7a08');
    r[2].setAttribute('x','44');r[2].setAttribute('y','63');r[2].setAttribute('width','22');r[2].setAttribute('height','4');r[2].setAttribute('fill','#39ff14');
    r[3].setAttribute('x','66');r[3].setAttribute('y','66');r[3].setAttribute('fill','#1a7a08');
    r[4].setAttribute('x','70');r[4].setAttribute('y','68');r[4].setAttribute('fill','#1a7a08');
  } else if(type==='open'){
    // 張口（聆聽/驚訝）
    r[0].style.display='none';r[1].style.display='none';r[3].style.display='none';r[4].style.display='none';
    r[2].setAttribute('x','40');r[2].setAttribute('y','63');r[2].setAttribute('width','29');r[2].setAttribute('height','5');r[2].setAttribute('fill','#39ff14');
  } else if(type==='flat'){
    // 一字型（思考/暖機）
    r[0].style.display='none';r[1].style.display='none';r[3].style.display='none';r[4].style.display='none';
    r[2].setAttribute('x','35');r[2].setAttribute('y','65');r[2].setAttribute('width','40');r[2].setAttribute('height','3');r[2].setAttribute('fill','#1a7a08');
  }
}
function _resetRobot(){
  var svg=document.querySelector('.robot-svg');
  svg.style.animation='';
  var eg=document.getElementById('eyeGrp');
  eg.className='eye-grp';eg.style.animation='';
  _eyePupils(33,32,12,10,65,32,12,10);
  document.getElementById('blushL').style.opacity='.6';
  document.getElementById('blushR').style.opacity='.6';
  document.getElementById('blushL').setAttribute('fill','#1a7a08');
  document.getElementById('blushR').setAttribute('fill','#1a7a08');
  document.getElementById('earL').style.animation='';document.getElementById('earL').setAttribute('fill','#39ff14');
  document.getElementById('earR').style.animation='';document.getElementById('earR').setAttribute('fill','#39ff14');
  document.getElementById('led1').style.animation='';document.getElementById('led1').setAttribute('fill','#39ff14');document.getElementById('led1').style.opacity='.7';
  document.getElementById('led2').style.animation='';document.getElementById('led2').setAttribute('fill','#1a7a08');document.getElementById('led2').style.opacity='1';
  _setMouth('smile');
}
function setFace(mood){
  _resetRobot();
  var svg=document.querySelector('.robot-svg');
  var eg=document.getElementById('eyeGrp');

  if(mood===''){
    // 預設待機
    _setMouth('smile');

  } else if(mood==='boot'){
    // 開機：眼睛掃描左右、耳朵交替閃、LED脈衝
    eg.style.animation='eyeScan 1s ease-in-out infinite';
    document.getElementById('earL').style.animation='earFlash .5s ease-in-out infinite';
    document.getElementById('earR').style.animation='earAlt .5s ease-in-out infinite';
    document.getElementById('led1').style.animation='ledPulse .4s ease-in-out infinite';
    document.getElementById('led2').style.animation='ledPulse .4s ease-in-out .2s infinite';
    _setMouth('flat');

  } else if(mood==='warmup'){
    // 暖機：眼睛緩慢左右思考
    eg.style.animation='eyeThink 1.8s ease-in-out infinite';
    _eyePupils(33,30,10,8,65,30,10,8);
    _setMouth('flat');
    document.getElementById('led1').style.animation='ledPulse .9s ease-in-out infinite';
    document.getElementById('led2').style.animation='ledPulse .9s ease-in-out .45s infinite';

  } else if(mood==='listen'){
    // 聆聽：眼睛向上、耳朵快閃、嘴巴微張
    _eyePupils(33,29,12,10,65,29,12,10);
    document.getElementById('earL').style.animation='earFlash .4s ease-in-out infinite';
    document.getElementById('earR').style.animation='earFlash .4s ease-in-out .2s infinite';
    _setMouth('open');

  } else if(mood==='think'){
    // 思考中：眼睛看右上、一字嘴
    _eyePupils(36,30,9,8,68,30,9,8);
    _setMouth('flat');

  } else if(mood==='happy'){
    // 開心：大眼睛、大笑、腮紅亮、彈跳
    eg.classList.add('happy');
    _eyePupils(30,30,15,12,62,30,15,12);
    document.getElementById('blushL').style.opacity='1';
    document.getElementById('blushR').style.opacity='1';
    document.getElementById('blushL').setAttribute('fill','#39ff14');
    document.getElementById('blushR').setAttribute('fill','#39ff14');
    _setMouth('big');
    document.getElementById('earL').setAttribute('fill','#39ff14');
    document.getElementById('earR').setAttribute('fill','#39ff14');
    document.getElementById('led1').setAttribute('fill','#39ff14');document.getElementById('led1').style.opacity='1';
    document.getElementById('led2').setAttribute('fill','#39ff14');document.getElementById('led2').style.opacity='1';
    svg.style.animation='happyBounce .45s ease-in-out 3';
    setTimeout(function(){ svg.style.animation=''; }, 1500);

// ════════════════════════════════════
// JSONP（有 callback，用於需要回傳值的請求）
// ════════════════════════════════════
function jsonp(url, cb){
  var name = '_ck_' + Date.now() + '_' + Math.floor(Math.random()*9999);
  var done = false;
  var script = document.createElement('script');
  var timer = setTimeout(function(){ finish(new Error('timeout'), null); }, 28000);
  function finish(e, d){
    if(done) return; done = true;
    clearTimeout(timer);
    try{ delete window[name]; }catch(ex){}
    try{ if(script.parentNode) script.parentNode.removeChild(script); }catch(ex){}
    cb(e, d);
  }
  window[name] = function(d){ finish(null, d); };
  script.onerror = function(){ finish(new Error('script error'), null); };
  script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + name;
  document.head.appendChild(script);
}

function startListen(){
  if(isListening) return;
  if(isSpeaking){ window.speechSynthesis.cancel(); isSpeaking = false; }
  if(!SESSION_ID){ typeText('請先等待場次載入\n或手動輸入場次ID'); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ typeText('此瀏覽器不支援語音\n請使用 Chrome！'); return; }
  recognition = new SR();
  recognition.lang = 'zh-TW';
  recognition.interimResults = false;
  recognition.maxAlternatives = 3;
  recognition.continuous = false;
  var btn = document.getElementById('micBtn');
  btn.classList.add('rec');
  btn.textContent = '[ 🔴 聽取中... ]';
  isListening = true;
  setFace('listen');
  setStatus('on', '聆聽中');
  typeText('請說出你的學號...');
  startListenSound();

  recognition.onresult = function(e){
    var heard = '';
    for(var i = 0; i < e.results[0].length; i++){
      var t = e.results[0][i].transcript.trim();
      // ✅ 先把中文數字轉成阿拉伯數字
      var converted = convertChineseNum(t);
      var n = converted.replace(/[^0-9]/g, '');
      console.log('語音原文：', t, '→ 轉換：', converted, '→ 數字：', n);
      if(n.length >= 6){ heard = n; break; }
      heard = n || t;
    }
    processCheckin(heard);
  };
  recognition.onerror = function(e){
    resetBtn();
    if(e.error === 'not-allowed'){
      setStatus('err', '麥克風被拒');
      typeText('請允許麥克風！\n點網址列旁的鎖頭圖示');
    } else if(e.error === 'no-speech'){
      setStatus('on', '就緒'); setFace(''); typeText('沒聽到聲音，再試一次？');
    } else {
      setStatus('err', e.error); typeText('辨識失敗 ('+e.error+')\n再按一次！');
    }
  };
  recognition.onend = function(){ resetBtn(); };
  recognition.start();
}

function resetBtn(){
  stopListenSound();
  isListening = false;
  var btn = document.getElementById('micBtn');
  btn.classList.remove('rec');
  btn.textContent = '[ 🎤 開始說話 ]';
}

// ════════════════════════════════════
// 中文數字 → 阿拉伯數字轉換
// ════════════════════════════════════
function convertChineseNum(str){
  var map = {
    '零':'0','〇':'0','一':'1','二':'2','三':'3','四':'4',
    '五':'5','六':'6','七':'7','八':'8','九':'9',
    '０':'0','１':'1','２':'2','３':'3','４':'4',
    '５':'5','６':'6','７':'7','８':'8','９':'9'
  };
  return str.split('').map(function(c){ return map[c] !== undefined ? map[c] : c; }).join('');
}

var SUCCESS  = ['{n}，簽到成功！花朵種好了！', '歡迎 {n}！出席紀錄完成！', '{n}！叮！登記了！', '收到！{n} 已到，辛苦了！'];

// ════════════════════════════════════
// ✅ 最終修正：讀寫分離
//    查名：JSONP（Chrome ORB 允許）
//    寫入：fetch no-cors（完全繞過 ORB）
// ════════════════════════════════════
function doLookup(studentId){
  var colors = ['#4A90D9','#F5C518','#4CAF50','#E53935','#8E44AD','#F06292','#FF8C00','#00BCD4','#9C27B0','#FF7043'];
  var ci = 0;
  for(var cc = 0; cc < studentId.length; cc++) ci += studentId.charCodeAt(cc);
  var autoColor = colors[ci % colors.length];

  // 本地防重複
  var key = SESSION_ID + '_' + studentId;
  if(checkedSet[key]){
    typeText('此學號本場次已登記！');
    speak('已經簽到過了！', function(){ setFace(''); setStatus('on', '就緒'); });
    return;
  }

  // ── Step 1：JSONP 查名（唯讀，ORB 允許）
  var lookupUrl = GAS_URL
    + '?action=lookupStudent'
    + '&studentId=' + encodeURIComponent(studentId);

  jsonp(lookupUrl, function(err, data){
    console.log('查名回傳：', JSON.stringify(data));
    if(err || !data || !data.ok || !data.name){
      setFace(''); setStatus('err', '找不到');
      playError();
      setFace('error');
      typeText(rand(NOTFOUND));
      speak('找不到這個學號，請再說一次。', function(){ setStatus('on', '就緒'); });
      return;
    }

    var sName    = data.name;
    var courseId = data.courseId || 'GN432';
    _lastStudentId = studentId;   // ✅ 給 fetchStudentStats 用
    _lastCourseId  = courseId;

    // 立刻顯示成功
    checkedSet[key] = true;
    localLog.push({
      time: new Date().toLocaleString('zh-TW'),
      sid: SESSION_ID, studentId: studentId, name: sName, color: autoColor
    });
    setFace('happy');
    typeText(rand(SUCCESS).replace('{n}', sName));
    playSuccess();
    window._cheerShown = false;
    setFaceSuper();
    spawnFlowers(14, null);
    speak(sName + '，簽到成功！花朵種好了！', function(){
      // 查出席率，顯示個人化鼓勵
      fetchStudentStats(_lastStudentId, _lastCourseId, function(stats){
        var msg = getPersonalMsg(sName, stats);
        if (msg) {
          typeText(msg);
          // 再飄一波有針對性的鼓勵詞
          setTimeout(function(){ spawnFlowers(6, stats); }, 500);
        }
        setTimeout(function(){ setFace(''); setStatus('on', '就緒'); }, msg ? 3000 : 0);
      });
    });
    addTag(sName);
    checkinCount++;
    document.getElementById('cntN').textContent = checkinCount;

    // ── Step 2：fetch 寫入（Vercel 有 CORS，直接 fetch 即可）
    var writeUrl = 'https://ck-proxy.vercel.app/api/proxy'
      + '?action=quickCheckin'
      + '&sid='       + encodeURIComponent(SESSION_ID)
      + '&studentId=' + encodeURIComponent(studentId)
      + '&name='      + encodeURIComponent(sName)
      + '&courseId='  + encodeURIComponent(courseId)
      + '&color='     + encodeURIComponent(autoColor);

    fetch(writeUrl)
      .then(function(r){
        console.log('✅ 寫入已送出：', sName, ' HTTP:', r.status);
      })
      .catch(function(e2){ console.warn('⚠️ fetch 錯誤：', e2.message); });
    // 5 秒後同步人數
    setTimeout(function(){
      jsonp(GAS_URL + '?action=getOpenSession', function(e2, d2){
        if(!e2 && d2 && d2.ok){
          document.getElementById('cntN').textContent     = d2.presentCount || checkinCount;
          document.getElementById('cntTotal').textContent = '/' + (d2.totalCount || 0);
        }
      });
    }, 5000);
  });
}
function addTag(name){
  var list = document.getElementById('tags');
  var t = document.createElement('div');
  t.className = 'tag new'; t.textContent = name;
  list.insertBefore(t, list.firstChild);
  setTimeout(function(){ t.classList.remove('new'); }, 2000);
  while(list.children.length > 6) list.removeChild(list.lastChild);
}

var _actx = null, _master = null, _audioOn = true, _audioReady = false;
var _listenPing = null;

function initAudio() {
  if (_actx) return;
  try {
    _actx = new (window.AudioContext || window.webkitAudioContext)();
    _master = _actx.createGain();
    _master.gain.value = 0.45;
    _master.connect(_actx.destination);
    _audioReady = true;
    playStartup();
    startAmbient();
  } catch(e) { console.log('audio init failed:', e); }
}

// AudioContext 心跳，防止被瀏覽器暫停
setInterval(function() {
  if (_actx && _actx.state === 'suspended') _actx.resume();
}, 1000);

function toggleAudio() {
  if (!_actx) { initAudio(); return; }
  _audioOn = !_audioOn;
  if (_master) _master.gain.setTargetAtTime(_audioOn ? 0.45 : 0, _actx.currentTime, 0.4);
  var btn = document.getElementById('audioToggle');
  if (btn) btn.textContent = _audioOn ? '🔊' : '🔇';
}

// ── 查詢學生出席率（JSONP 直接呼叫 GAS）─────────────────────────────────────
function fetchStudentStats(studentId, courseId, callback) {
  var cbName = 'statsCallback_' + Date.now();
  var script  = document.createElement('script');
  var timeout = setTimeout(function(){
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
    callback(null); // 逾時就不顯示
  }, 5000);

  window[cbName] = function(data) {
    clearTimeout(timeout);
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
    callback(data);
  };

  var url = GAS_DIRECT_URL + '?action=getStudentStats'
    + '&studentId=' + encodeURIComponent(studentId)
    + '&courseId='  + encodeURIComponent(courseId || 'GN432')
    + '&callback='  + cbName;
  script.src = url;
  document.head.appendChild(script);
}

// ── 根據出席率選出最適合的鼓勵詞池 ─────────────────────────────────────────
function getCheerPool(stats) {
  if (!stats || !stats.ok) return CHEERS_GENERAL;
  if (stats.isFirst)   return CHEERS_FIRST;
  if (stats.isPerfect) return CHEERS_PERFECT;
  // 出席 5 次以上，給更熱烈的鼓勵
  if (stats.attended >= 5) return CHEERS_HIGH;
  return CHEERS_GENERAL;
}

// ── 根據出席率產生主訊息 ─────────────────────────────────────────────────────
function getPersonalMsg(sName, stats) {
  if (!stats || !stats.ok) return null;
  var a = stats.attended;   // 本次含在內的出席次數
  var t = stats.total;      // 課程總場次

  // 全勤：出席次數 = 總場次（且超過 1 次）
  if (a === t && a >= 2) {
    return sName + ' 全勤！\n共 ' + t + ' 次點名，一次都沒缺 🏆';
  }

  // 第一次
  if (a === 1) {
    return '歡迎 ' + sName + '！\n今天是本學期第一次出席 🌱';
  }

  // 其他：只說第幾次，簡單正向
  var suffix = '';
  if (a >= 10) suffix = '\n資深出席者！';
  else if (a >= 5) suffix = '\n出席很穩定！';

  return sName + ' 今天第 ' + a + ' 次出席！' + suffix;
}

function spawnFlowers(count, stats) {
  // 每次隨機選 1 種飄出類型，保持 Robot 獨特個性
  var TYPES = ['flowers', 'emoji', 'chinese', 'english'];
  var pick  = TYPES[Math.floor(Math.random() * TYPES.length)];
  var cheerPool = getCheerPool(stats);

  // 分類鼓勵詞
  var emojiOnly    = cheerPool.filter(function(c){ return /[\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}]/u.test(c); });
  var chineseOnly  = cheerPool.filter(function(c){ return /[\u4e00-\u9fff]/.test(c) && !/[\u{1F300}-\u{1FFFF}]/u.test(c); });
  var englishOnly  = cheerPool.filter(function(c){ return /^[A-Z! ]+$/.test(c.trim()); });

  var n = count || 8;

  if (pick === 'flowers') {
    // 只飄花，少一點精緻
    for (var i = 0; i < n; i++) {
      (function(idx) {
        setTimeout(function() {
          var color = FLOWER_COLORS[Math.floor(Math.random() * FLOWER_COLORS.length)];
          var size  = 26 + Math.random() * 32;
          var left  = 5 + Math.random() * 90;
          var dur   = 2.2 + Math.random() * 2.0;
          var stage = Math.floor(Math.random() * 4);
          var el = document.createElement('div');
          el.className = 'float-flower';
          el.style.left = left + 'vw';
          el.style.animationDuration = dur + 's';
          el.appendChild(makeMiniFlower(color, size, stage));
          document.body.appendChild(el);
          setTimeout(function(){ if(el.parentNode)el.parentNode.removeChild(el); }, (dur+0.3)*1000);
        }, idx * 180 + Math.random() * 100);
      })(i);
    }

  } else {
    // 只飄文字/emoji，選特定類型，3-4 個
    var pool = pick === 'emoji'   ? emojiOnly :
               pick === 'chinese' ? chineseOnly : englishOnly;
    if (!pool || pool.length < 2) pool = cheerPool;

    var shown = [];
    var showCount = 3 + Math.floor(Math.random() * 2); // 3 or 4
    for (var j = 0; j < showCount; j++) {
      (function(jidx) {
        setTimeout(function() {
          var available = pool.filter(function(c){ return shown.indexOf(c) < 0; });
          if (!available.length) { shown = []; available = pool; }
          var cheer = available[Math.floor(Math.random() * available.length)];
          shown.push(cheer);

          var isEmoji = /[\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}]/u.test(cheer);
          var fontSize = isEmoji ? (2.2 + Math.random() * 1.4) : (1.6 + Math.random() * 1.0);
          var left  = 15 + Math.random() * 70;
          var dur   = 2.8 + Math.random() * 1.8;
          var colors = ['#39ff14','#FFD700','#FF6B9D','#87CEEB','#FFA500','#DDA0DD'];
          var color  = colors[Math.floor(Math.random() * colors.length)];

          var el = document.createElement('div');
          el.className = 'float-text';
          el.style.left = left + 'vw';
          el.style.fontSize = fontSize + 'em';
          el.style.color = color;
          el.style.animationDuration = dur + 's';
          el.textContent = cheer;
          document.body.appendChild(el);
          setTimeout(function(){ if(el.parentNode)el.parentNode.removeChild(el); }, (dur+0.3)*1000);
        }, jidx * 350 + Math.random() * 200);
      })(j);
    }
  }
}

function makeMiniFlower(color, size, stage) {
  var NS = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size * 1.2);
  svg.setAttribute('viewBox', '0 0 44 52');
  svg.setAttribute('overflow', 'visible');

  // 莖
  var stem = document.createElementNS(NS, 'rect');
  stem.setAttribute('x','21'); stem.setAttribute('y','18');
  stem.setAttribute('width','2'); stem.setAttribute('height','32');
  stem.setAttribute('fill','#2a5c38'); stem.setAttribute('rx','1');
  svg.appendChild(stem);

  var fc = {x:22, y:14};
  var hg = document.createElementNS(NS, 'g');

  if (stage === 0) {
    // 花苞
    var bud = document.createElementNS(NS, 'ellipse');
    bud.setAttribute('cx','22'); bud.setAttribute('cy','14');
    bud.setAttribute('rx','4'); bud.setAttribute('ry','7');
    bud.setAttribute('fill', color);
    hg.appendChild(bud);
  } else {
    var pc = stage===1?4:stage===2?5:6;
    var pd = stage===1?4.5:stage===2?6:7.5;
    var rx = stage===1?2:stage===2?3.2:4;
    var ry = stage===1?5.5:stage===2?6.5:7.5;
    var aS = 360/pc, aO = Math.random()*aS;
    for (var i=0;i<pc;i++){
      var a=i*aS+aO, ar=a*Math.PI/180;
      var px=fc.x+pd*Math.sin(ar), py=fc.y-pd*Math.cos(ar);
      var el=document.createElementNS(NS,'ellipse');
      el.setAttribute('cx',px.toFixed(1)); el.setAttribute('cy',py.toFixed(1));
      el.setAttribute('rx',rx+''); el.setAttribute('ry',ry+'');
      el.setAttribute('fill',color); el.setAttribute('opacity','.93');
      el.setAttribute('transform','rotate('+a.toFixed(1)+',22,14)');
      hg.appendChild(el);
    }
    var c1=document.createElementNS(NS,'circle');
    c1.setAttribute('cx','22'); c1.setAttribute('cy','14');
    c1.setAttribute('r', stage===3?'5':'3.5');
    c1.setAttribute('fill','#fff9e6'); hg.appendChild(c1);
    var c2=document.createElementNS(NS,'circle');
    c2.setAttribute('cx','22'); c2.setAttribute('cy','14');
    c2.setAttribute('r', stage===3?'3.2':'2');
    c2.setAttribute('fill','#f5c040'); hg.appendChild(c2);
  }
  svg.appendChild(hg);
  return svg;
}

function playBlip() {
  if (!_actx) return;
  var now = _actx.currentTime;
  var freqs = [880, 1100, 1320, 660, 1760, 550];
  var f = freqs[Math.floor(Math.random() * freqs.length)];
  var o = _actx.createOscillator(); var g = _actx.createGain();
  o.type = 'sine'; o.frequency.value = f;
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.05, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
  o.connect(g); g.connect(_master); o.start(now); o.stop(now + 0.22);
}

function playWarmup() {

  if (!_actx || !_audioOn) return;
  var count = 0;
  var iv = setInterval(function(){
    if (!_actx || !_audioOn || count > 12) { clearInterval(iv); return; }
    var now = _actx.currentTime;
    var o = _actx.createOscillator(), g = _actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(200 + count * 15, now);
    o.frequency.linearRampToValueAtTime(300 + count * 15, now + 0.25);
    g.gain.setValueAtTime(0.08, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    o.connect(g); g.connect(_master); o.start(now); o.stop(now+0.35);
    count++;
  }, 800);
  return iv;
}

希望下次更多同學能出席！');
    setFace('think');
    setTimeout(function(){
      speak('今天出席率' + rate + '巴仙。還不錯，但老師希望下次更多同學能來！', function(){
        // 說完後轉為鼓勵表情
        setFace('happy');
        typeText('加油！期待下次見到你們 💪');
        setTimeout(function(){ setFace(''); }, 3000);
      });
    }, 800);

  } else {
    // 😟 低：難過 → 搖頭 → 激勵
    typeText('⏹ 點名結束
出席 ' + present + '/' + (total||'?') + ' 位
出席率只有 ' + rate + '%
缺席的同學要加油了！');
    setFace('error');
    playError();
    setTimeout(function(){
      speak('今天出席率只有' + rate + '巴仙，', function(){
        // 說完難過的部分，切換表情激勵
        setFace('listen');
        typeText('缺席的同學，下次一定要來喔！
出席才能跟上進度！加油 💪');
        speak('缺席的同學，下次一定要來！出席才能跟上進度，老師在等你們！', function(){
          setFace('');
        });
      });
    }, 600);
  }
}
var _started = false;
function onStartClick(){
  if (_started) return;
  _started = true;
  var overlay = document.getElementById('startOverlay');
  if (overlay) {
    overlay.style.transition = 'opacity .4s';
    overlay.style.opacity = '0';
    setTimeout(function(){ overlay.style.display='none'; }, 400);
  }
  loadVoices();
  initAudio();
  setTimeout(init, 200);
}
